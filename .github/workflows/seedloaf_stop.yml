name: Seedloaf-Stop

on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Seedloaf-Switch-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/seedloaf_switch.py seedloaf_switch.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🔍 curl 直接测试 StopSession
        env:
          SEEDLOAF_ACCOUNT: ${{ secrets.SEEDLOAF_ACCOUNT }}
        run: |
          EMAIL=$(echo "$SEEDLOAF_ACCOUNT" | cut -d',' -f2)
          PASSWORD=$(echo "$SEEDLOAF_ACCOUNT" | cut -d',' -f3)
          echo "📡 登录获取 token..."
          LOGIN=$(curl -s -X POST \
            'https://clerk.seedloaf.com/v1/client/sign_ins?__clerk_api_version=2025-11-10' \
            -H 'content-type: application/x-www-form-urlencoded' \
            -H 'origin: https://seedloaf.com' \
            -c /tmp/clerk_cookies.txt \
            --data-urlencode "identifier=$EMAIL" \
            --data-urlencode "password=$PASSWORD")
          SESSION_ID=$(echo "$LOGIN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['created_session_id'])")
          echo "✅ Session ID: ${SESSION_ID:0:20}..."
          echo "📡 Touch 获取 token..."
          TOUCH=$(curl -s -X POST \
            "https://clerk.seedloaf.com/v1/client/sessions/${SESSION_ID}/touch?__clerk_api_version=2025-11-10" \
            -H 'content-type: application/x-www-form-urlencoded' \
            -H 'origin: https://seedloaf.com' \
            -b /tmp/clerk_cookies.txt \
            -d 'active_organization_id=&intent=focus')
          TOKEN=$(echo "$TOUCH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['last_active_token']['jwt'])")
          echo "✅ Token 长度: ${#TOKEN}"
          echo "📡 调用 StopSession..."
          curl -s -X POST \
            'https://api.seedloaf.com/connect/worlds.v1.SessionService/StopSession' \
            -H "authorization: Bearer $TOKEN" \
            -H 'connect-protocol-version: 1' \
            -H 'content-type: application/json' \
            -d '{"id":"8d0b4344-a4d3-4e00-837f-cd809609905c"}' \
            -w "\nHTTP状态: %{http_code}\n"

      - name: 🔴 关闭服务器
        env:
          SEEDLOAF_ACCOUNT: ${{ secrets.SEEDLOAF_ACCOUNT }}
          SEEDLOAF_ACTION: stop
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python3 seedloaf_switch.py
